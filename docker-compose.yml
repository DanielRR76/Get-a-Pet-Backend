services:
  db:
    image: postgres:15
    container_name: database_backend
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_SCHEMA}

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
